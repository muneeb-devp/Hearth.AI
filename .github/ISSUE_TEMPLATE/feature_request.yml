name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please give enough context for us to understand the need and evaluate the request.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation you're in and what's currently difficult or impossible.
      placeholder: "When I do X, I can't do Y because Z..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Code sketches are very welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Did you explore any workarounds? Why are they not good enough?

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - Core inference (Hearth.AI)
        - ASP.NET Core integration
        - Model download / HuggingFace
        - GPU backends
        - Project templates
        - Documentation
        - CI / build / packaging
        - Other
    validations:
      required: true
